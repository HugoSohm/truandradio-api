services:
  api:
    build: .
    container_name: truandradio-api
    volumes:
      - ${MP3_DOWNLOAD_DIR:-./mp3}:/app/mp3
      - ${COVER_DOWNLOAD_DIR:-./cover}:/app/cover
    environment:
      - PORT=4242
      - MP3_DOWNLOAD_DIR=/app/mp3
      - COVER_DOWNLOAD_DIR=/app/cover
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET}
      - API_KEY=${API_KEY}
      - BASE_URL=${BASE_URL}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-mypassword}@redis:6379
    depends_on:
      - redis
    networks:
      - truand-radio-network
    restart: always
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:4242/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:alpine
    container_name: truandradio-api-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-mypassword} --protected-mode yes
    volumes:
      - redis_data:/data
    networks:
      - truand-radio-network
    restart: always

networks:
  truand-radio-network:
    external: true

volumes:
  redis_data:
