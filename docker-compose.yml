services:
  api:
    build: .
    container_name: truandradio-api
    environment:
      - PORT=4242
      - STORAGE_PATH=${STORAGE_PATH:-/app/storage}
      - AUDIO_DOWNLOAD_DIR=${STORAGE_PATH:-/app/storage}/${AUDIO_DOWNLOAD_DIR:-music/tracks}
      - COVER_DOWNLOAD_DIR=${STORAGE_PATH:-/app/storage}/${COVER_DOWNLOAD_DIR:-music/covers}
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET}
      - API_KEY=${API_KEY}
      - BASE_URL=${BASE_URL}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-mypassword}@redis:6379
    volumes:
      - ${S3_MOUNT_PATH}:/app/storage
    depends_on:
      - redis
    networks:
      - truand-radio-network
    restart: always
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:4242/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:alpine
    container_name: truandradio-api-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-mypassword} --protected-mode yes
    volumes:
      - redis_data:/data
    networks:
      - truand-radio-network
    restart: always

networks:
  truand-radio-network:
    external: true

volumes:
  redis_data:
